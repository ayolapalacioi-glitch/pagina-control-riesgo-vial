services:
  backend:
    build:
      context: .
      dockerfile: backend_py/Dockerfile
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./:/app
      - ./certs:/app/certs
    command: sh /app/backend_py/entrypoint.sh
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_ORIGIN=*
      - USE_MQTT=false
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC=yolo/crosswalk/cam-001
      - LAN_IP=192.168.2.245
      - YOLO_MODEL_PATH=yolov8n.pt
      - YOLO_CONF=0.35
    healthcheck:
      test: ["CMD", "python", "-c", "import ssl, urllib.request, sys; ctx=ssl._create_unverified_context(); r=urllib.request.urlopen('https://localhost:4000/api/health', context=ctx, timeout=5); sys.exit(0 if r.status < 400 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"

