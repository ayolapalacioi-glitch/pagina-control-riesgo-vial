services:
  backend:
    image: node:20
    working_dir: /app/backend
    restart: unless-stopped
    volumes:
      - ./:/app
      - backend_node_modules:/app/backend/node_modules
      - ./certs:/app/certs
    command: sh /app/backend/entrypoint.sh
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_ORIGIN=*
      - USE_MQTT=false
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC=sensecraft/crosswalk/cam-001
      - LAN_IP=192.168.2.245
    healthcheck:
      test: ["CMD", "node", "-e", "const https=require('https');https.get({hostname:'localhost',port:4000,path:'/api/health',rejectUnauthorized:false},r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"

volumes:
  backend_node_modules:
