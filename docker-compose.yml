services:
  backend:
    image: node:20
    working_dir: /app/backend
    restart: unless-stopped
    volumes:
      - ./:/app
      - backend_node_modules:/app/backend/node_modules
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi; npm run dev"
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_ORIGIN=*
      - USE_MQTT=false
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - MQTT_TOPIC=sensecraft/crosswalk/cam-001
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    depends_on:
      - mosquitto

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"

volumes:
  backend_node_modules:
